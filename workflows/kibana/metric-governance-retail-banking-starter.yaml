# =============================================================================
# Retail Banking - Metric governance loop (starter)
#
# Kibana 9.5+ expects: version: "1", top-level name/enabled/description, triggers, steps.
# Import: Observability - Workflows - Create workflow - paste YAML, or:
#   PUT /api/workflows/workflow/{id}  with JSON {"yaml": "<this file>"}
#
# For a 5m schedule, replace the manual trigger with:
#   triggers:
#     - type: scheduled
#       with:
#         every: "5m"
# WARNING: scheduled + Case each run creates many cases - validate on manual first.
# =============================================================================

version: "1"
name: Retail Banking Metric governance snapshot
enabled: false
description: >
  Adaptive-metrics governance: lists Streams, runs ES|QL to estimate **modeled_policy_savings_pct**
  (illustrative % of metric-ingest points reclaimable after Streams / downsampling / aggregation),
  opens an Observability Case with that headline, and attaches the JSON for **AI Assistant**
  dollarization. Pair with Executive dashboard Lens (see Challenge 2 instructions).

triggers:
  - type: manual

steps:
  - name: list_streams
    type: kibana.streams.list
    with: {}

  - name: metrics_snapshot
    type: elasticsearch.esql.query
    with:
      format: json
      query: |
        FROM metrics*
        | WHERE @timestamp > NOW() - 15 minutes
        | STATS
            metric_points = COUNT(*),
            points_core_services = COUNT(*) WHERE service.name IN ("payment-engine", "claims-processor", "mobile-gateway", "member-portal", "fraud-sentinel", "policy-manager", "auth-gateway", "document-vault", "quote-engine"),
            pay_tps = AVG(payment_engine.transactions_per_sec),
            ach_q = AVG(payment_engine.ach_queue_depth),
            claims_q = AVG(claims_processor.queue_depth),
            fraud_score = AVG(fraud_sentinel.avg_risk_score)
        | EVAL streams_eligible_pct = CASE(metric_points == 0, 0.0, ROUND(100.0 * (metric_points - COALESCE(points_core_services, 0)) / metric_points, 2))
        | EVAL modeled_policy_savings_pct = ROUND(streams_eligible_pct * 0.35, 2)

  - name: governance_case
    type: cases.createCase
    with:
      title: "[Governance] TCO snapshot — adaptive-metrics (modeled savings % in body)"
      description: |
        ### Modeled ingest savings — adaptive-metrics workflow

        **What leadership should read first:** the workflow run attached **`modeled_policy_savings_pct`**
        — an *illustrative* **% of total OTLP metric points** this model treats as reclaimable after
        **Streams routing, downsampling, or aggregation** (factor **0.35** on eligible volume — tune
        before production). **`streams_eligible_pct`** is the share of points **outside** the nine
        core retail-banking `service.name` values (demo heuristic for “not clearly declared-used”).

        **Why this is an “AI saves money” story:** the **deterministic workflow** produces the %;
        **Observability AI Assistant** on this Case turns the JSON into **$/month** language using
        your storage and retention assumptions — paste that answer back here for CFO review.

        **Intent:** Compare to **Systems Operations**, **Executive**, and **SLOs** as *declared usage*;
        then route eligible volume to cheaper tiers or child streams — see Streams UI + Case JSON.

        Next: add a workflow [AI step](https://www.elastic.co/docs/explore-analyze/workflows/steps/ai-steps)
        and optional `kibana.request` `PUT /api/streams/{name}` after human approval.
      owner: observability
      severity: low
      tags:
        - metric-governance
        - retail-banking
        - streams-next
        - tco-adaptive-metrics
        - ai-dollarization

  - name: attach_esql_comment
    type: cases.addComment
    with:
      case_id: "{{ steps.governance_case.output.case.id }}"
      comment: |
        ### Adaptive-metrics TCO headline (read before JSON)

        | Field | One-line meaning |
        |-------|------------------|
        | **modeled_policy_savings_pct** | **Headline savings %** — modeled share of *all* metric points you could reclaim after Streams / downsampling / aggregation (demo uses **0.35 × eligible**). |
        | **streams_eligible_pct** | Share of points **not** tagged to the nine core retail-banking services — **Streams / tiering candidate** volume. |

        **AI saves money (next click):** open **Observability AI Assistant** on this Case and ask for a **$/month** estimate from these two fields + your $/GB assumptions; paste the answer below for leadership.

        ---

        **ES|QL snapshot** (`metrics_snapshot` step output):

        ```json
        {{ steps.metrics_snapshot.output | json }}
        ```

        **Streams:** `list_streams` completed; inspect full JSON in the workflow run detail in Kibana.
