version: "3"
virtualmachines:
- name: es3-api
  image: elastic/es3-api-v2
  shell: /bin/bash
  environment:
    ELASTIC_LAUNCH_DEMO_BRANCH: feat/systems-ops-executive-dashboards
    ELASTIC_LAUNCH_DEMO_REPO: https://github.com/poulsbopete/elastic-launch-demo.git
    PRODUCT_TIER: complete
    PROJECT_TYPE: observability
    REGIONS: aws-us-east-1
  memory: 12288
  cpus: 4
  allow_external_ingress:
  - http
  - https
  - high-ports
