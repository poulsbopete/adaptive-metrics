version: "3"
virtualmachines:
- name: es3-api
  image: elastic/es3-api-v2
  shell: /bin/bash
  environment:
    ELASTIC_LAUNCH_DEMO_BRANCH: feat/systems-ops-executive-dashboards
    ELASTIC_LAUNCH_DEMO_REPO: https://github.com/poulsbopete/elastic-launch-demo.git
    PRODUCT_TIER: complete
    PROJECT_TYPE: observability
    REGIONS: aws-us-east-1
  memory: 12288
  cpus: 4
  allow_external_ingress:
  - http
  - https
  - high-ports
# Declared here so Git + CLI pushes keep the same sandbox contract as the Instruqt UI.
# Values are configured only in Instruqt (Sandbox → Secrets), never committed to Git.
secrets:
  - name: LLM_PROXY_PROD
  - name: ESS_CLOUD_API_KEY
