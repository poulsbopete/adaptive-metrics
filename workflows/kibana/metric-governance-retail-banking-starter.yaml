# =============================================================================
# Retail Banking - Metric governance loop (starter)
#
# Kibana 9.5+ expects: version: "1", top-level name/enabled/description, triggers, steps.
# Import: Observability - Workflows - Create workflow - paste YAML, or:
#   PUT /api/workflows/workflow/{id}  with JSON {"yaml": "<this file>"}
#
# For a 5m schedule, replace the manual trigger with:
#   triggers:
#     - type: scheduled
#       with:
#         every: "5m"
# WARNING: scheduled + Case each run creates many cases - validate on manual first.
# =============================================================================

version: "1"
name: Retail Banking Metric governance snapshot
enabled: false
description: >
  Lists Streams, captures a retail-banking ES|QL metric snapshot, and opens an
  Observability case for governance review. Extend with AI classification and
  Streams updates (kibana.request or Streams steps) per your runbook.

triggers:
  - type: manual

steps:
  - name: list_streams
    type: kibana.streams.list
    with: {}

  - name: metrics_snapshot
    type: elasticsearch.esql.query
    with:
      format: json
      query: |
        TS metrics*
        | WHERE @timestamp > NOW() - 15 minutes
        | STATS
            metric_points = COUNT(*),
            pay_tps = AVG(payment_engine.transactions_per_sec),
            ach_q = AVG(payment_engine.ach_queue_depth),
            claims_q = AVG(claims_processor.queue_depth),
            fraud_score = AVG(fraud_sentinel.avg_risk_score)

  - name: governance_case
    type: cases.createCase
    with:
      title: "[Governance] Retail Banking metric snapshot"
      description: |
        Scheduled **metric governance** snapshot (Retail Banking demo).

        **Intent:** Compare this run to **Systems Operations**, **Executive**, and **SLOs**
        as *declared usage*; identify high-volume series that never appear there; propose
        downsampling, Streams child routes, or retention - then approve changes out-of-band.

        Next iteration: add an [AI step](https://www.elastic.co/docs/explore-analyze/workflows/steps/ai-steps)
        and optional `kibana.request` to `PUT /api/streams/{name}` after approval.
      owner: observability
      severity: low
      tags:
        - metric-governance
        - retail-banking
        - streams-next

  - name: attach_esql_comment
    type: cases.addComment
    with:
      case_id: "{{ steps.governance_case.output.case.id }}"
      comment: |
        **ES|QL snapshot** (`metrics_snapshot` step output):

        ```json
        {{ steps.metrics_snapshot.output | json }}
        ```

        **Streams:** `list_streams` completed; inspect full JSON in the workflow run
        detail in Kibana if the editor does not surface step payloads in comments.
