#     type: ai.agent
#     agent-id: "YOUR_AGENT_BUILDER_AGENT_ID"
#     connector-id: "YOUR_GENAI_CONNECTOR_ID"
#     create-conversation: true
#     with:
#       message: |
#         Streams inventory (truncated): {{ steps.list_streams.output | json | truncate: 12000 }}
