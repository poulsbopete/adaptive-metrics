# =============================================================================
# Retail Banking - Metric governance loop (starter)
#
# Kibana 9.5+ expects: version: "1", top-level name/enabled/description, triggers, steps.
# Import: Observability - Workflows - Create workflow - paste YAML, or:
#   PUT /api/workflows/workflow/{id}  with JSON {"yaml": "<this file>"}
#
# Trigger: **scheduled every 5 minutes** (Streams + ES|QL + Case snapshot). Each run creates
# a **new** `[Governance]` Case — fine for lab demos; for production, add case-reuse / longer
# intervals / or switch back to **manual** once you tune the model.
# HITL: when the gated AI branch is enabled, **`waitForInput`** pauses each run until a
# reviewer submits the form—avoid **5m schedule + HITL** without `settings.timeout` or you
# will stack paused executions; keep **`gated_ai_streams_recommendations`** off until ready.
# Agent Builder: swap **`ai.prompt`** for **`ai.agent`** (top-level **`agent-id`**, **`connector-id`**)
# so a tool-enabled agent reasons over the same context; see Elastic [AI steps](https://www.elastic.co/docs/explore-analyze/workflows/steps/ai-steps).
# =============================================================================

version: "1"
name: Retail Banking Metric governance snapshot
enabled: true
description: >
  Adaptive-metrics governance: lists Streams, runs ES|QL for savings-style scores and pretend
  dollar amounts, and opens an Observability Case whose **description is written in plain English**
  (field names stay in the JSON comment for adults). Includes a gated **ai.prompt** branch (off by
  default) for structured retention / routing ideas—apply **PUT /api/streams/{name}** only after
  **kibana.streams.get** + human merge + approved **kibana.request**. Optional **waitForInput** HITL
  inside the AI gate. Pair with the Executive dashboard exercise in the Instruqt track.

triggers:
  - type: scheduled
    with:
      every: 5m

steps:
  - name: list_streams
    type: kibana.streams.list
    with: {}

  - name: metrics_snapshot
    type: elasticsearch.esql.query
    with:
      format: json
      query: |
        FROM metrics*
        | WHERE @timestamp > NOW() - 15 minutes
        | STATS
            metric_points = COUNT(*),
            points_core_services = COUNT(*) WHERE service.name IN ("payment-engine", "claims-processor", "mobile-gateway", "member-portal", "fraud-sentinel", "policy-manager", "auth-gateway", "document-vault", "quote-engine"),
            points_governance_lab = COUNT(*) WHERE service.name == "noisy-governance-shipper",
            pay_tps = AVG(payment_engine.transactions_per_sec),
            ach_q = AVG(payment_engine.ach_queue_depth),
            claims_q = AVG(claims_processor.queue_depth),
            fraud_score = AVG(fraud_sentinel.avg_risk_score)
        | EVAL metric_points_retail_model = metric_points - COALESCE(points_governance_lab, 0)
        | EVAL streams_eligible_pct = CASE(metric_points_retail_model == 0, 0.0, ROUND(100.0 * (metric_points_retail_model - COALESCE(points_core_services, 0)) / metric_points_retail_model, 2))
        | EVAL demo_streams_capture_on_eligible = 1.28
        | EVAL modeled_policy_savings_pct = ROUND(LEAST(88.0, streams_eligible_pct * demo_streams_capture_on_eligible), 2)
        | EVAL streams_governance_lab_pct = CASE(metric_points == 0, 0.0, ROUND(100.0 * COALESCE(points_governance_lab, 0) / metric_points, 2))
        | EVAL modeled_governance_lab_savings_pct = ROUND(LEAST(95.0, streams_governance_lab_pct * demo_streams_capture_on_eligible), 2)
        | EVAL points_in_savings_envelope = ROUND(metric_points_retail_model * modeled_policy_savings_pct / 100.0 + COALESCE(points_governance_lab, 0) * modeled_governance_lab_savings_pct / 100.0, 0)
        | EVAL assumed_usd_per_million_points_month = 2.50
        | EVAL periods_per_month = (30.0 * 24.0 * 60.0) / 15.0
        | EVAL estimated_monthly_observe_bill_usd = ROUND((metric_points / 1000000.0) * assumed_usd_per_million_points_month * periods_per_month, 2)
        | EVAL estimated_monthly_reclaim_usd = ROUND((points_in_savings_envelope / 1000000.0) * assumed_usd_per_million_points_month * periods_per_month, 2)
        | EVAL pct_savings_of_estimated_observe_bill = CASE(estimated_monthly_observe_bill_usd == 0, 0.0, ROUND(100.0 * estimated_monthly_reclaim_usd / estimated_monthly_observe_bill_usd, 2))

  - name: governance_case
    type: cases.createCase
    with:
      title: "[Governance] TCO snapshot — adaptive-metrics (modeled savings % in body)"
      description: |
        ### Could we save money by cleaning up extra data? (practice story)

        Think of your apps sending **lots of tiny messages** into Elastic, like filling jars with marbles.

        **The headline number** is a **practice score** for “how much messy stuff we *might* tidy if we kept less junk, split traffic smarter, or squashed noisy metrics.” In this lab we use a demo knob so the score often lands around **“7 out of 10”** (like **70¢** on a pretend dollar) — **not** your real Elastic Cloud bill.

        **The two dollar amounts** are **pretend monthly bills**: we multiply “how many marbles” by a made‑up “price per million marbles.” They are good for **comparing bigger vs smaller**, not for paying a vendor.

        **What to do next:** open **Observability AI Assistant** on this Case and ask it to explain the numbers **in normal words** for a leader. Grown‑ups can still read the **exact fields** in the comment with the JSON.

        **Safety:** this starter **does not** auto‑change your data rules. A person still says yes or no before anything serious happens. **Streams** (where data lives and how long we keep it) is the lever — on Serverless you don’t fiddle with old‑school “hot/warm/cold” knobs.
      owner: observability
      severity: low
      tags:
        - metric-governance
        - retail-banking
        - streams-next
        - tco-adaptive-metrics
        - ai-dollarization

  - name: attach_esql_comment
    type: cases.addComment
    with:
      case_id: "{{ steps.governance_case.output.case.id }}"
      comment: |
        ### Cheat sheet (picture → grown‑up name)

        | If you picture… | The field name in the JSON |
        |-----------------|----------------------------|
        | **“How much could we tidy?” score** (capped so it never says above **88**) | `modeled_policy_savings_pct` |
        | **Share of messages that are “extra”** (not the nine main bank apps), after we set aside practice traffic | `streams_eligible_pct` |
        | **Count of practice “noise” messages** from the lab shipper | `points_governance_lab` |
        | **What percent of *all* messages are that practice noise** | `streams_governance_lab_pct` |
        | **Practice tidy‑score just for that noise slice** | `modeled_governance_lab_savings_pct` |
        | **Pretend “full jar” monthly cost** (not a real invoice) | `estimated_monthly_observe_bill_usd` |
        | **Pretend “money back if we tidy” monthly amount** (still not a real invoice) | `estimated_monthly_reclaim_usd` |
        | **“How much of the pretend bill we get back,” in percent** | `pct_savings_of_estimated_observe_bill` |

        **Try this with the AI:** “Explain the pretend **observe** and **reclaim** dollars like I’m eleven, and say what we’d still need a real finance person to check.”

        ---

        **Exact numbers** (from the workflow step `metrics_snapshot`):

        ```json
        {{ steps.metrics_snapshot.output | json }}
        ```

        **Streams list:** the workflow also ran **`list_streams`** — open the workflow run in Kibana to see that JSON.

        **Optional smart helper:** a gated **AI** step in the YAML is **off** until you wire a GenAI connector and flip its `condition` to `${{ true }}`. When on, a human must still **approve** before live stream JSON is pasted here.

  # ---------------------------------------------------------------------------
  # Gated AI: structured FinOps plan for Streams (retention / routing / drops).
  # Default condition is always false — flip to ${{ true }} after GenAI connector.
  # Optional: set connector-id on ai_streams_plan (top level, kebab-case).
  # Apply changes only with kibana.streams.get + human merge + kibana.request PUT.
  # ---------------------------------------------------------------------------
  - name: gated_ai_streams_recommendations
    type: if
    condition: "${{ 1 == 2 }}"
    steps:
      - name: ai_streams_plan
        type: ai.prompt
        with:
          systemPrompt: |
            You are an Observability FinOps advisor. Output ONLY JSON matching the schema.
            Prefer shorter retention windows or child-stream routing over hard deletes.
            Never recommend dropping data for the nine core retail-banking service.name values
            (payment-engine, claims-processor, mobile-gateway, member-portal, fraud-sentinel,
            policy-manager, auth-gateway, document-vault, quote-engine) or anything that could carry
            PCI/PII without explicit human approval. The metrics snapshot may include
            **noisy-governance-shipper** (synthetic lab OTLP): treat it as **governance-demo** traffic
            separate from retail core/eligible math when reasoning about production. When unsure, use action "no_change" and streamName "none".
            At most five actions; prioritize highest document-volume noise from the inventory.
          prompt: |
            **Streams inventory (truncated JSON):**
            {{ steps.list_streams.output | json | truncate: 12000 }}

            **Metrics governance snapshot (ES|QL step output, truncated):**
            {{ steps.metrics_snapshot.output | json | truncate: 6000 }}

            Propose concrete Streams-oriented savings: retention days suggestions and/or routing or
            drop hints that reduce storage cost. Reference stream **names** exactly as they appear in inventory.
          temperature: 0.2
          schema:
            type: object
            properties:
              summary:
                type: string
              actions:
                type: array
                maxItems: 5
                items:
                  type: object
                  properties:
                    streamName:
                      type: string
                    action:
                      type: string
                      enum:
                        - shorten_retention
                        - suggest_drop_or_child_route
                        - no_change
                    retentionDaysSuggested:
                      type: integer
                      minimum: 1
                      maximum: 365
                    dropOrRouteHint:
                      type: string
                    rationale:
                      type: string
                    estimatedSavingsBand:
                      type: string
                      enum:
                        - low
                        - medium
                        - high
                        - unknown
                  required:
                    - streamName
                    - action
                    - rationale
                    - estimatedSavingsBand
            required:
              - summary
              - actions

      - name: attach_ai_streams_plan
        type: cases.addComment
        with:
          case_id: "{{ steps.governance_case.output.case.id }}"
          comment: |
            ### AI plan — read this before changing anything

            **In plain English:** {{ steps.ai_streams_plan.output.content.summary }}

            **Machine‑readable plan** (for adults who will apply it):

            ```json
            {{ steps.ai_streams_plan.output.content | json }}
            ```

            **Safety:** fetch the **current** stream with **`kibana.streams.get`**, merge by hand (or in another workflow), then **`PUT /api/streams/{name}`** only when a human is happy — see [Create or update a stream](https://www.elastic.co/docs/api/doc/kibana/operation/operation-put-streams-name). Never paste half a JSON into production.

      # --- Human-in-the-loop: pause for approval, then attach live stream body for merge ---
      - name: hitl_streams_gate
        type: waitForInput
        with:
          message: |
            ## One last check before we copy live settings

            **What the AI said (short):** {{ steps.ai_streams_plan.output.content.summary }}

            - **Approve** = we will **look up** the stream you type and **paste the real settings** into this Case so someone can merge them carefully.
            - **Reject** = we **do nothing**; no lookup, no change.

            This is like asking “show me the recipe card” before you cook — it does **not** auto‑apply changes.
          schema:
            type: object
            properties:
              approved:
                type: boolean
                title: "OK to fetch live stream JSON?"
              streamName:
                type: string
                title: "Stream name (copy exactly from the list)"
              notes:
                type: string
                title: "Note to the team (optional)"
            required:
              - approved
              - streamName

      - name: fetch_stream_for_merge
        type: kibana.streams.get
        if: "steps.hitl_streams_gate.output.approved : true"
        with:
          name: "{{ steps.hitl_streams_gate.output.streamName }}"

      - name: attach_live_stream_for_merge
        type: cases.addComment
        if: "steps.hitl_streams_gate.output.approved : true"
        with:
          case_id: "{{ steps.governance_case.output.case.id }}"
          comment: |
            ### Live “recipe card” for stream **{{ steps.hitl_streams_gate.output.streamName }}**

            **Reviewer notes:** {{ steps.hitl_streams_gate.output.notes }}

            ```json
            {{ steps.fetch_stream_for_merge.output | json }}
            ```

            A grown‑up should **merge** this with the AI plan above, then **`PUT /api/streams/{name}`** only when they mean it.

      - name: attach_hitl_rejected
        type: cases.addComment
        if: "steps.hitl_streams_gate.output.approved : false"
        with:
          case_id: "{{ steps.governance_case.output.case.id }}"
          comment: |
            **Stopped here:** the reviewer chose **not** to fetch live stream JSON this time.
            **Their note:** {{ steps.hitl_streams_gate.output.notes }}

# -----------------------------------------------------------------------------
# Optional: replace `ai_streams_plan` (type: ai.prompt) with Agent Builder:
#
