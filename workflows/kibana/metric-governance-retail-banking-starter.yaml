#         Return the same structured FinOps actions as the ai.prompt schema in this file.
#       schema:
#         type: object
#         ... # mirror properties under ai_streams_plan.schema above
#
# Structured fields appear on `steps.ai_streams_plan.output.structured_output` when using schema;
# adjust Liquid in `attach_ai_streams_plan` / `hitl_streams_gate` if your agent step uses
# different output paths than `ai.prompt`'s `output.content`.
